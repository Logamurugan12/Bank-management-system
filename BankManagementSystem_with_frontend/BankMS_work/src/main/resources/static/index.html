<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartBank — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --bg2: #10131a;
      --bg3: #161b26;
      --card: #13171f;
      --card2: #1a1f2e;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold2: #e8c87a;
      --gold-glow: rgba(201,168,76,0.15);
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --text: #f0f0f0;
      --text2: #9aa0b0;
      --text3: #5a6070;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100%;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    #root { position: relative; z-index: 1; display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 16px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px 32px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-section {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 8px;
      margin: 16px 0 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.18s;
      font-size: 14px;
      font-weight: 400;
      color: var(--text2);
      user-select: none;
      border: 1px solid transparent;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active {
      background: var(--gold-glow);
      color: var(--gold2);
      border-color: rgba(201,168,76,0.2);
    }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .version-badge {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      padding: 8px;
    }

    /* ── MAIN ── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 32px 36px;
      min-height: 100vh;
    }

    .page-header {
      margin-bottom: 28px;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .page-subtitle { font-size: 14px; color: var(--text2); }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(201,168,76,0.3); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-weight: 500; }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .stat-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
    .stat-icon {
      position: absolute;
      top: 18px; right: 18px;
      font-size: 22px;
      opacity: 0.3;
    }

    /* ── GRID 2 COL ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 12px 14px; color: var(--text2); vertical-align: middle; }
    tbody td:first-child { color: var(--text); font-weight: 500; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge-red { background: rgba(239,68,68,0.12); color: var(--red); }
    .badge-blue { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge-gold { background: var(--gold-glow); color: var(--gold2); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0a0c10;
      font-weight: 600;
    }
    .btn-gold:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .btn-outline:hover { background: var(--bg3); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-green { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .btn-green:hover { background: rgba(34,197,94,0.25); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
    input, select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.18s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--gold); }
    select option { background: var(--bg2); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--card);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 18px;
      padding: 28px;
      width: 420px;
      max-width: 95vw;
      animation: slideUp 0.2s ease;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .modal-close {
      cursor: pointer;
      color: var(--text3);
      font-size: 20px;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--bg3); color: var(--text); }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    /* ── ACCOUNT CARD ── */
    .account-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .account-card {
      background: linear-gradient(135deg, var(--card2), var(--card));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }
    .account-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-2px); }
    .account-card::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow), transparent);
    }
    .account-number { font-size: 12px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.08em; }
    .account-holder { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .account-balance { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: var(--gold2); }
    .account-balance-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .account-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-text { font-size: 14px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 13.5px;
      z-index: 9999;
      animation: slideUp 0.2s ease;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast-success { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .toast-error { border-color: rgba(239,68,68,0.4); color: var(--red); }

    /* ── AMOUNT DISPLAY ── */
    .amount-positive { color: var(--green); font-weight: 600; }
    .amount-negative { color: var(--red); font-weight: 600; }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .topbar-right { display: flex; gap: 10px; }

    .page { animation: fadeIn 0.2s ease; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = 'http://localhost:8080/api';

// ── API helpers ──
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Request failed' }));
    throw new Error(err.error || 'Request failed');
  }
  if (res.status === 204) return null;
  return res.json();
}

// ── Formatters ──
const fmt = (n) => '₹' + Number(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 });
const fmtDate = (s) => s ? new Date(s).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';

// ── Toast ──
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast toast-${type}`}>{type === 'success' ? '✓ ' : '✕ '}{msg}</div>;
}

// ── Modal ──
function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <span className="modal-close" onClick={onClose}>×</span>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Dashboard Page ──
function Dashboard({ accounts, transactions, onRefresh }) {
  const totalBalance = accounts.reduce((s, a) => s + (a.balance || 0), 0);
  const savings = accounts.filter(a => a.accountType === 'SAVINGS');
  const current = accounts.filter(a => a.accountType === 'CURRENT');
  const deposits = transactions.filter(t => t.type === 'DEPOSIT').reduce((s, t) => s + t.amount, 0);
  const withdrawals = transactions.filter(t => t.type === 'WITHDRAWAL').reduce((s, t) => s + t.amount, 0);

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Dashboard</div>
        <div className="page-subtitle">Welcome back! Here's your financial overview.</div>
      </div>

      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-icon">🏦</div>
          <div className="stat-label">Total Balance</div>
          <div className="stat-value" style={{color: 'var(--gold2)', fontSize: '22px'}}>{fmt(totalBalance)}</div>
          <div className="stat-sub">Across all accounts</div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">👤</div>
          <div className="stat-label">Total Accounts</div>
          <div className="stat-value">{accounts.length}</div>
          <div className="stat-sub">{savings.length} Savings · {current.length} Current</div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">⬆️</div>
          <div className="stat-label">Total Deposited</div>
          <div className="stat-value" style={{color: 'var(--green)', fontSize: '20px'}}>{fmt(deposits)}</div>
          <div className="stat-sub">All time</div>
        </div>
        <div className="stat-card">
          <div className="stat-icon">⬇️</div>
          <div className="stat-label">Total Withdrawn</div>
          <div className="stat-value" style={{color: 'var(--red)', fontSize: '20px'}}>{fmt(withdrawals)}</div>
          <div className="stat-sub">All time</div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Recent Transactions</div>
        {transactions.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">📋</div><div className="empty-text">No transactions yet</div></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Account</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Balance After</th>
                  <th>Description</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                {transactions.map(t => (
                  <tr key={t.id}>
                    <td style={{fontFamily:'monospace', fontSize:'12px'}}>{t.accountNumber}</td>
                    <td>
                      <span className={`badge badge-${t.type === 'DEPOSIT' ? 'green' : 'red'}`}>
                        {t.type === 'DEPOSIT' ? '↑' : '↓'} {t.type}
                      </span>
                    </td>
                    <td className={t.type === 'DEPOSIT' ? 'amount-positive' : 'amount-negative'}>
                      {t.type === 'DEPOSIT' ? '+' : '-'}{fmt(t.amount)}
                    </td>
                    <td>{fmt(t.balanceAfter)}</td>
                    <td style={{color:'var(--text3)', fontSize:'12px'}}>{t.description || '—'}</td>
                    <td style={{fontSize:'12px'}}>{fmtDate(t.timestamp)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Accounts Page ──
function Accounts({ accounts, onRefresh, showToast }) {
  const [showCreate, setShowCreate] = useState(false);
  const [showDeposit, setShowDeposit] = useState(null);
  const [showWithdraw, setShowWithdraw] = useState(null);
  const [form, setForm] = useState({ holderName: '', accountType: 'SAVINGS', balance: '' });
  const [txForm, setTxForm] = useState({ amount: '', description: '' });
  const [loading, setLoading] = useState(false);

  const createAccount = async () => {
    if (!form.holderName.trim()) return showToast('Enter holder name', 'error');
    setLoading(true);
    try {
      await api('/accounts', 'POST', { ...form, balance: parseFloat(form.balance) || 0 });
      showToast('Account created!', 'success');
      setShowCreate(false);
      setForm({ holderName: '', accountType: 'SAVINGS', balance: '' });
      onRefresh();
    } catch (e) { showToast(e.message, 'error'); }
    setLoading(false);
  };

  const doDeposit = async () => {
    const amt = parseFloat(txForm.amount);
    if (!amt || amt <= 0) return showToast('Enter valid amount', 'error');
    setLoading(true);
    try {
      await api(`/accounts/${showDeposit.id}/deposit`, 'PUT', txForm);
      showToast(`${fmt(amt)} deposited!`, 'success');
      setShowDeposit(null);
      setTxForm({ amount: '', description: '' });
      onRefresh();
    } catch (e) { showToast(e.message, 'error'); }
    setLoading(false);
  };

  const doWithdraw = async () => {
    const amt = parseFloat(txForm.amount);
    if (!amt || amt <= 0) return showToast('Enter valid amount', 'error');
    setLoading(true);
    try {
      await api(`/accounts/${showWithdraw.id}/withdraw`, 'PUT', txForm);
      showToast(`${fmt(amt)} withdrawn!`, 'success');
      setShowWithdraw(null);
      setTxForm({ amount: '', description: '' });
      onRefresh();
    } catch (e) { showToast(e.message, 'error'); }
    setLoading(false);
  };

  const deleteAccount = async (acc) => {
    if (!confirm(`Delete account ${acc.accountNumber}? This cannot be undone.`)) return;
    try {
      await api(`/accounts/${acc.id}`, 'DELETE');
      showToast('Account deleted', 'success');
      onRefresh();
    } catch (e) { showToast(e.message, 'error'); }
  };

  return (
    <div className="page">
      <div className="topbar">
        <div>
          <div className="page-title">Accounts</div>
          <div className="page-subtitle">{accounts.length} account{accounts.length !== 1 ? 's' : ''} total</div>
        </div>
        <div className="topbar-right">
          <button className="btn btn-outline" onClick={onRefresh}>↻ Refresh</button>
          <button className="btn btn-gold" onClick={() => setShowCreate(true)}>+ New Account</button>
        </div>
      </div>

      {accounts.length === 0 ? (
        <div className="card"><div className="empty-state"><div className="empty-icon">🏦</div><div className="empty-text">No accounts yet. Create one!</div></div></div>
      ) : (
        <div className="account-cards">
          {accounts.map(acc => (
            <div key={acc.id} className="account-card">
              <div className="account-number">{acc.accountNumber}</div>
              <div className="account-holder">{acc.holderName}</div>
              <span className={`badge badge-${acc.accountType === 'SAVINGS' ? 'blue' : 'gold'}`} style={{marginBottom: '12px', display:'inline-block'}}>
                {acc.accountType}
              </span>
              <div className="account-balance-label">Available Balance</div>
              <div className="account-balance">{fmt(acc.balance)}</div>
              <div className="account-actions">
                <button className="btn btn-green btn-sm" onClick={() => { setShowDeposit(acc); setTxForm({amount:'',description:''}); }}>↑ Deposit</button>
                <button className="btn btn-danger btn-sm" onClick={() => { setShowWithdraw(acc); setTxForm({amount:'',description:''}); }}>↓ Withdraw</button>
                <button className="btn btn-outline btn-sm" onClick={() => deleteAccount(acc)} style={{color:'var(--text3)'}}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Create Modal */}
      {showCreate && (
        <Modal title="Create Account" onClose={() => setShowCreate(false)}>
          <div className="form-group"><label>Account Holder Name</label><input value={form.holderName} onChange={e => setForm({...form, holderName: e.target.value})} placeholder="Full name"/></div>
          <div className="form-group"><label>Account Type</label><select value={form.accountType} onChange={e => setForm({...form, accountType: e.target.value})}><option value="SAVINGS">Savings</option><option value="CURRENT">Current</option></select></div>
          <div className="form-group"><label>Initial Deposit (₹)</label><input type="number" value={form.balance} onChange={e => setForm({...form, balance: e.target.value})} placeholder="0.00" min="0"/></div>
          <div style={{display:'flex', gap:'10px', justifyContent:'flex-end', marginTop:'6px'}}>
            <button className="btn btn-outline" onClick={() => setShowCreate(false)}>Cancel</button>
            <button className="btn btn-gold" onClick={createAccount} disabled={loading}>{loading ? 'Creating...' : 'Create Account'}</button>
          </div>
        </Modal>
      )}

      {/* Deposit Modal */}
      {showDeposit && (
        <Modal title={`Deposit — ${showDeposit.holderName}`} onClose={() => setShowDeposit(null)}>
          <div style={{background:'var(--bg3)', borderRadius:'var(--radius-sm)', padding:'12px 16px', marginBottom:'20px'}}>
            <div style={{fontSize:'12px', color:'var(--text3)'}}>Current Balance</div>
            <div style={{fontFamily:'Syne', fontSize:'22px', color:'var(--gold2)'}}>{fmt(showDeposit.balance)}</div>
          </div>
          <div className="form-group"><label>Deposit Amount (₹)</label><input type="number" value={txForm.amount} onChange={e => setTxForm({...txForm, amount: e.target.value})} placeholder="0.00" min="1"/></div>
          <div className="form-group"><label>Description (optional)</label><input value={txForm.description} onChange={e => setTxForm({...txForm, description: e.target.value})} placeholder="e.g. Salary, Transfer..."/></div>
          <div style={{display:'flex', gap:'10px', justifyContent:'flex-end'}}>
            <button className="btn btn-outline" onClick={() => setShowDeposit(null)}>Cancel</button>
            <button className="btn btn-green" onClick={doDeposit} disabled={loading}>{loading ? '...' : '↑ Deposit'}</button>
          </div>
        </Modal>
      )}

      {/* Withdraw Modal */}
      {showWithdraw && (
        <Modal title={`Withdraw — ${showWithdraw.holderName}`} onClose={() => setShowWithdraw(null)}>
          <div style={{background:'var(--bg3)', borderRadius:'var(--radius-sm)', padding:'12px 16px', marginBottom:'20px'}}>
            <div style={{fontSize:'12px', color:'var(--text3)'}}>Available Balance</div>
            <div style={{fontFamily:'Syne', fontSize:'22px', color:'var(--gold2)'}}>{fmt(showWithdraw.balance)}</div>
          </div>
          <div className="form-group"><label>Withdraw Amount (₹)</label><input type="number" value={txForm.amount} onChange={e => setTxForm({...txForm, amount: e.target.value})} placeholder="0.00" min="1"/></div>
          <div className="form-group"><label>Description (optional)</label><input value={txForm.description} onChange={e => setTxForm({...txForm, description: e.target.value})} placeholder="e.g. Rent, Shopping..."/></div>
          <div style={{display:'flex', gap:'10px', justifyContent:'flex-end'}}>
            <button className="btn btn-outline" onClick={() => setShowWithdraw(null)}>Cancel</button>
            <button className="btn btn-danger" onClick={doWithdraw} disabled={loading}>{loading ? '...' : '↓ Withdraw'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Transactions Page ──
function Transactions({ accounts, showToast }) {
  const [transactions, setTransactions] = useState([]);
  const [selectedAcc, setSelectedAcc] = useState('all');
  const [loading, setLoading] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      let data;
      if (selectedAcc === 'all') {
        data = await api('/accounts/recent-transactions');
      } else {
        data = await api(`/accounts/${selectedAcc}/transactions`);
      }
      setTransactions(data || []);
    } catch (e) { showToast('Failed to load transactions', 'error'); }
    setLoading(false);
  }, [selectedAcc]);

  useEffect(() => { load(); }, [load]);

  return (
    <div className="page">
      <div className="topbar">
        <div>
          <div className="page-title">Transactions</div>
          <div className="page-subtitle">{transactions.length} records</div>
        </div>
        <div style={{display:'flex', gap:'10px', alignItems:'center'}}>
          <select value={selectedAcc} onChange={e => setSelectedAcc(e.target.value)} style={{width:'200px'}}>
            <option value="all">All (Recent 10)</option>
            {accounts.map(a => <option key={a.id} value={a.id}>{a.holderName} — {a.accountNumber}</option>)}
          </select>
          <button className="btn btn-outline" onClick={load}>↻</button>
        </div>
      </div>

      <div className="card">
        {loading ? (
          <div className="empty-state"><div className="empty-text">Loading...</div></div>
        ) : transactions.length === 0 ? (
          <div className="empty-state"><div className="empty-icon">📋</div><div className="empty-text">No transactions found</div></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>#</th><th>Account</th><th>Type</th><th>Amount</th><th>Balance After</th><th>Description</th><th>Date & Time</th></tr>
              </thead>
              <tbody>
                {transactions.map((t, i) => (
                  <tr key={t.id}>
                    <td style={{color:'var(--text3)', fontSize:'12px'}}>{i+1}</td>
                    <td style={{fontFamily:'monospace', fontSize:'12px'}}>{t.accountNumber}</td>
                    <td><span className={`badge badge-${t.type === 'DEPOSIT' ? 'green' : 'red'}`}>{t.type === 'DEPOSIT' ? '↑ ' : '↓ '}{t.type}</span></td>
                    <td className={t.type === 'DEPOSIT' ? 'amount-positive' : 'amount-negative'}>{t.type === 'DEPOSIT' ? '+' : '-'}{fmt(t.amount)}</td>
                    <td>{fmt(t.balanceAfter)}</td>
                    <td style={{color:'var(--text3)', fontSize:'12px'}}>{t.description || '—'}</td>
                    <td style={{fontSize:'12px', color:'var(--text2)'}}>{fmtDate(t.timestamp)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [page, setPage] = useState('dashboard');
  const [accounts, setAccounts] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [toast, setToast] = useState(null);

  const showToast = (msg, type = 'success') => setToast({ msg, type });

  const loadAll = useCallback(async () => {
    try {
      const [accs, txs] = await Promise.all([
        api('/accounts'),
        api('/accounts/recent-transactions')
      ]);
      setAccounts(accs || []);
      setTransactions(txs || []);
    } catch (e) {
      showToast('Could not connect to server. Make sure Spring Boot is running on :8080', 'error');
    }
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  const navItems = [
    { id: 'dashboard', icon: '⬛', label: 'Dashboard' },
    { id: 'accounts',  icon: '🏦', label: 'Accounts' },
    { id: 'transactions', icon: '📋', label: 'Transactions' },
  ];

  return (
    <>
      <div className="sidebar">
        <div className="logo">
          <div className="logo-icon">₿</div>
          <div className="logo-text">SmartBank</div>
        </div>

        <div className="nav-section">Main Menu</div>
        {navItems.map(item => (
          <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
            <span className="nav-icon">{item.icon}</span>
            {item.label}
          </div>
        ))}

        <div className="sidebar-footer">
          <div className="version-badge">SmartBank v1.0 · Spring Boot</div>
        </div>
      </div>

      <div className="main">
        {page === 'dashboard' && <Dashboard accounts={accounts} transactions={transactions} onRefresh={loadAll}/>}
        {page === 'accounts' && <Accounts accounts={accounts} onRefresh={loadAll} showToast={showToast}/>}
        {page === 'transactions' && <Transactions accounts={accounts} showToast={showToast}/>}
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
